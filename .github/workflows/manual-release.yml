name: Manual Release

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to extract changelog from (optional)'
        required: false
        type: string
      version_override:
        description: 'Version override (leave empty to use AssemblyVersion from csproj)'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release (beta/RC from dev branch)'
        required: false
        type: boolean
        default: false
      skip_virustotal:
        description: 'Skip VirusTotal scan'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run - build but do not create release'
        required: false
        type: boolean
        default: false
      vhc_monitor_version:
        description: 'vhc-monitor version to bundle (e.g. v0.2.0.16, or "latest")'
        required: false
        type: string
        default: 'latest'

permissions:
  contents: write
  pull-requests: read

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore vHC/HC.sln

    - name: Build solution
      run: dotnet build vHC/HC.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test vHC/HC.sln --configuration Release --no-build --verbosity normal
      continue-on-error: true

    - name: Get version
      id: get_version
      shell: pwsh
      env:
        VERSION_OVERRIDE: ${{ inputs.version_override }}
      run: |
        if ("$env:VERSION_OVERRIDE" -ne "") {
          $version = "$env:VERSION_OVERRIDE"
          Write-Host "Using override version: $version"
        } else {
          $csproj = [xml](Get-Content vHC/HC_Reporting/VeeamHealthCheck.csproj)
          $version = $csproj.Project.PropertyGroup[0].AssemblyVersion
          Write-Host "Using AssemblyVersion from csproj: $version"
        }
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Publish single-file executable
      shell: pwsh
      run: |
        dotnet publish vHC/HC_Reporting/VeeamHealthCheck.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true `
          -o publish/out

    - name: Download vhc-monitor companion
      id: download_vhc_monitor
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VHC_MONITOR_VERSION: ${{ inputs.vhc_monitor_version || 'latest' }}
      run: |
        $repo = "VeeamHub/vhc-monitor"
        try {
          if ($env:VHC_MONITOR_VERSION -eq "latest") {
            $release = gh release view --repo $repo --json tagName | ConvertFrom-Json
            $tag = $release.tagName
          } else {
            $tag = $env:VHC_MONITOR_VERSION
          }
          Write-Host "Downloading vhc-monitor $tag..."
          gh release download $tag --repo $repo --pattern "vhc-monitor.exe" --dir publish/out
          $hash = (Get-FileHash "publish/out/vhc-monitor.exe" -Algorithm SHA256).Hash
          $manifest = @{ version = $tag; sha256 = $hash; bundled_at = (Get-Date -Format o) }
          $manifest | ConvertTo-Json | Out-File "publish/out/BUNDLE_MANIFEST.json" -Encoding utf8
          Write-Host "Bundled vhc-monitor $tag (SHA256: $hash)"
          "vhc_monitor_version=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        } catch {
          Write-Warning "vhc-monitor download failed: $_"
          Write-Warning "Proceeding without vhc-monitor. VHC will show 'Not bundled' status."
        }
      continue-on-error: true

    - name: Create ZIP archive
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        Compress-Archive -Path publish/out/* -DestinationPath "publish/VeeamHealthCheck-$version.zip"
        Write-Host "Created: VeeamHealthCheck-$version.zip"

    - name: Compute file hash
      id: hash
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        $zipPath = "publish/VeeamHealthCheck-$version.zip"
        $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash
        $sizeMB = [math]::Round((Get-Item $zipPath).Length / 1MB, 2)
        "hash=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "size_mb=$sizeMB" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        Write-Host "SHA256: $hash"
        Write-Host "Size: $sizeMB MB"

    - name: VirusTotal Scan
      id: virustotal
      if: ${{ !inputs.skip_virustotal }}
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        $zipPath = "publish/VeeamHealthCheck-$version.zip"
        $apiKey = "${{ secrets.VIRUSTOTAL_API_KEY }}"
        $headers = @{ "x-apikey" = $apiKey }
        $fileSizeMB = [math]::Round((Get-Item $zipPath).Length / 1MB, 1)

        try {
          # Files >32 MB require the large-file upload URL (VT premium endpoint)
          $uploadUri = "https://www.virustotal.com/api/v3/files"
          if ($fileSizeMB -gt 32) {
            Write-Host "File is $fileSizeMB MB — requesting large-file upload URL..."
            $urlResp = Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/files/upload_url" -Headers $headers
            $uploadUri = $urlResp.data
            Write-Host "Got large-file upload URL"
          }
          $uploadResponse = Invoke-RestMethod -Uri $uploadUri -Method Post -Headers $headers -Form @{ file = Get-Item $zipPath }
          $analysisId = $uploadResponse.data.id
          Write-Host "Uploaded to VirusTotal ($fileSizeMB MB). Analysis ID: $analysisId"

          $maxAttempts = 20
          $attempt = 0
          $analysisComplete = $false

          while (-not $analysisComplete -and $attempt -lt $maxAttempts) {
            Start-Sleep -Seconds 30
            $attempt++
            $analysisResponse = Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/analyses/$analysisId" -Headers $headers
            $status = $analysisResponse.data.attributes.status

            if ($status -eq "completed") {
              $analysisComplete = $true
              $stats = $analysisResponse.data.attributes.stats
              $malicious = $stats.malicious
              $suspicious = $stats.suspicious

              if ($malicious -eq 0 -and $suspicious -eq 0) {
                "vt_result=Clean (0 detections)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
                "vt_clean=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              } else {
                "vt_result=WARNING: $malicious malicious, $suspicious suspicious" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
                "vt_clean=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              }
              $fileHash = "${{ steps.hash.outputs.hash }}".ToLower()
              "vt_link=https://www.virustotal.com/gui/file/$fileHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            }
            Write-Host "Attempt $attempt/$maxAttempts - Status: $status"
          }

          if (-not $analysisComplete) {
            "vt_result=Scan timeout - check manually" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "vt_clean=unknown" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
        } catch {
          Write-Host "VirusTotal error: $_"
          "vt_result=Scan failed" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "vt_clean=error" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        }
      continue-on-error: true

    - name: Set VirusTotal defaults
      id: vt_defaults
      if: ${{ inputs.skip_virustotal }}
      shell: pwsh
      env:
        SKIP_VIRUSTOTAL: ${{ inputs.skip_virustotal }}
      run: |
        if ("$env:SKIP_VIRUSTOTAL" -eq "true") {
          "vt_result=Skipped by user" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        } else {
          "vt_result=No API key configured" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        }
        "vt_clean=skipped" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Get PR changelog
      id: changelog
      if: ${{ inputs.pr_number != '' }}
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ inputs.pr_number }}
      run: |
        $prNumber = "$env:PR_NUMBER"
        try {
          $prJson = gh pr view $prNumber --json title,body
          $pr = $prJson | ConvertFrom-Json
          $body = $pr.body

          # Write body to file for later use
          $body | Out-File -FilePath "pr_body.txt" -Encoding UTF8
          "pr_title=$($pr.title)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "has_changelog=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        } catch {
          "has_changelog=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        }

    - name: Generate release notes
      id: release_notes
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        $hash = "${{ steps.hash.outputs.hash }}"
        $sizeMB = "${{ steps.hash.outputs.size_mb }}"
        $vtResult = if ("${{ steps.virustotal.outputs.vt_result }}") { "${{ steps.virustotal.outputs.vt_result }}" } else { "${{ steps.vt_defaults.outputs.vt_result }}" }
        $vtClean = if ("${{ steps.virustotal.outputs.vt_clean }}") { "${{ steps.virustotal.outputs.vt_clean }}" } else { "${{ steps.vt_defaults.outputs.vt_clean }}" }
        $commitSha = "${{ github.sha }}"
        $repo = "${{ github.repository }}"
        $buildDate = (Get-Date).ToString("yyyy-MM-ddTHH:mm:ssZ")

        $vtEmoji = switch ($vtClean) {
          "true"    { "✅" }
          "false"   { "⚠️" }
          "skipped" { "⏭️" }
          default   { "❓" }
        }

        # Parse structured changelog sections from PR body
        # Sections: ### ✨ Features | ### 🐛 Bug Fixes | ### 🧪 Tests & CI
        $features = [System.Collections.Generic.List[string]]::new()
        $fixes    = [System.Collections.Generic.List[string]]::new()
        $testsCI  = [System.Collections.Generic.List[string]]::new()

        if (Test-Path "pr_body.txt") {
          $currentSection = $null
          foreach ($line in (Get-Content "pr_body.txt")) {
            if     ($line -match '^###\s+.*\bFeatures?\b')              { $currentSection = 'features' }
            elseif ($line -match '^###\s+.*\bBug\s+Fixes?\b')          { $currentSection = 'fixes' }
            elseif ($line -match '^###\s+.*\b(?:Tests?\b|CI\b)')       { $currentSection = 'testsci' }
            elseif ($line -match '^##')                                 { $currentSection = $null }
            elseif ($currentSection) {
              $t = $line.Trim()
              if ($t -match '^-\s+\S' -and $t -notmatch '^<!--') {
                switch ($currentSection) {
                  'features' { $features.Add($t) }
                  'fixes'    { $fixes.Add($t) }
                  'testsci'  { $testsCI.Add($t) }
                }
              }
            }
          }
        }

        # Build release notes
        $notes = [System.Collections.Generic.List[string]]::new()
        $notes.Add("## Veeam Health Check v$version")
        $notes.Add("")

        # Structured changelog sections (populated from PR body)
        $hasChangelog = ($features.Count + $fixes.Count + $testsCI.Count) -gt 0

        if ($features.Count -gt 0) {
          $notes.Add("### ✨ Features")
          $notes.Add("")
          $features | ForEach-Object { $notes.Add($_) }
          $notes.Add("")
        }

        if ($fixes.Count -gt 0) {
          $notes.Add("### 🐛 Bug Fixes")
          $notes.Add("")
          $fixes | ForEach-Object { $notes.Add($_) }
          $notes.Add("")
        }

        if ($testsCI.Count -gt 0) {
          $notes.Add("### 🧪 Tests & CI")
          $notes.Add("")
          $testsCI | ForEach-Object { $notes.Add($_) }
          $notes.Add("")
        }

        if ($hasChangelog) {
          $notes.Add("---")
          $notes.Add("")
        } elseif (Test-Path "pr_body.txt") {
          # Fallback for legacy/unstructured PR bodies
          $notes.Add("### 🆕 What's New")
          $notes.Add("")
          Get-Content "pr_body.txt" | ForEach-Object { $notes.Add($_) }
          $notes.Add("")
          $notes.Add("---")
          $notes.Add("")
        } else {
          # No PR body — auto-generate from git log since last tag
          $prevTag = git describe --tags --abbrev=0 HEAD 2>$null
          if ($LASTEXITCODE -eq 0 -and $prevTag) {
            $logLines = git log "$prevTag..HEAD" --no-merges --format="%s" 2>$null
            $featLines = [System.Collections.Generic.List[string]]::new()
            $fixLines  = [System.Collections.Generic.List[string]]::new()
            $ciScopes = @('ci', 'release', 'release-notes', 'test', 'tests', 'deps', 'build')
            foreach ($msg in $logLines) {
              if ($msg -match '^(feat|fix)(\(([^)]+)\))?[!]?:\s*(.+)') {
                $scope = $Matches[3]
                $text  = $Matches[4]
                if ($scope -and ($ciScopes -contains $scope)) { continue }
                if ($Matches[1] -eq 'feat') { $featLines.Add("- $text") }
                else                        { $fixLines.Add("- $text") }
              }
            }
            if ($featLines.Count -gt 0) {
              $notes.Add("### ✨ Features")
              $notes.Add("")
              $featLines | ForEach-Object { $notes.Add($_) }
              $notes.Add("")
            }
            if ($fixLines.Count -gt 0) {
              $notes.Add("### 🐛 Bug Fixes")
              $notes.Add("")
              $fixLines | ForEach-Object { $notes.Add($_) }
              $notes.Add("")
            }
            if ($featLines.Count + $fixLines.Count -gt 0) { $notes.Add("---"); $notes.Add("") }
          }
        }

        $notes.Add("### ✅ Security & Quality Verification")
        $notes.Add("- ✅ Build & Unit Tests: **Passed**")
        $notes.Add("- $vtEmoji VirusTotal Scan: **$vtResult**")
        $notes.Add("- ✅ Code Quality: Analyzed")
        $notes.Add("")
        $notes.Add("### 📦 Download")
        $notes.Add("**VeeamHealthCheck-$version.zip** ($sizeMB MB)")
        $notes.Add("")
        $notes.Add("**SHA256 Checksum:**")
        $notes.Add('```')
        $notes.Add($hash)
        $notes.Add('```')
        $notes.Add("")
        $notes.Add("**Verification Command:**")
        $notes.Add('```powershell')
        $notes.Add("(Get-FileHash `"VeeamHealthCheck-$version.zip`").Hash")
        $notes.Add('```')
        $notes.Add("")
        $notes.Add("### 📋 Requirements")
        $notes.Add("- Windows 7 or later")
        $notes.Add("- .NET 8 runtime (included in self-contained build)")
        $notes.Add("- PowerShell 5.1 or later")
        $notes.Add("")
        $notes.Add("### 🚀 Quick Start")
        $notes.Add("1. Download the ZIP file above")
        $notes.Add("2. Extract to a folder")
        $notes.Add("3. Run ``VeeamHealthCheck.exe``")
        $notes.Add("")
        $notes.Add("---")
        $notes.Add("")
        $notes.Add("**Built from:** [$commitSha](https://github.com/$repo/commit/$commitSha)")
        $notes.Add("**Build Date:** $buildDate")

        ($notes -join "`n") | Out-File -FilePath "release_notes.md" -Encoding UTF8
        Write-Host "Generated release notes"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: veeam-healthcheck-${{ steps.get_version.outputs.version }}
        path: publish/VeeamHealthCheck-${{ steps.get_version.outputs.version }}.zip
        retention-days: 90

    - name: Create GitHub Release
      if: ${{ !inputs.dry_run }}
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_VERSION: ${{ steps.get_version.outputs.version }}
        IS_PRERELEASE: ${{ inputs.prerelease }}
        GH_REPO: ${{ github.repository }}
      run: |
        $version = $env:RELEASE_VERSION
        $zipPath = "publish/VeeamHealthCheck-$version.zip"
        $notesFile = "release_notes.md"

        $existingRelease = gh release view "v$version" 2>&1
        if ($LASTEXITCODE -eq 0) {
          Write-Host "Release v$version already exists. Updating..."
          gh release edit "v$version" --notes-file $notesFile
          gh release upload "v$version" $zipPath --clobber
        } else {
          Write-Host "Creating new release v$version..."
          $prereleaseFlag = if ($env:IS_PRERELEASE -eq "true") { "--prerelease" } else { "" }
          gh release create "v$version" --title "Veeam Health Check v$version" --notes-file $notesFile $zipPath $prereleaseFlag
        }
        Write-Host "Release URL: https://github.com/$env:GH_REPO/releases/tag/v$version"

    - name: Dry run summary
      if: ${{ inputs.dry_run }}
      shell: pwsh
      run: |
        Write-Host "=== DRY RUN SUMMARY ==="
        Write-Host ""
        Write-Host "Version: ${{ steps.get_version.outputs.version }}"
        Write-Host "SHA256: ${{ steps.hash.outputs.hash }}"
        Write-Host "Size: ${{ steps.hash.outputs.size_mb }} MB"
        Write-Host ""
        Write-Host "=== RELEASE NOTES ==="
        Get-Content release_notes.md
        Write-Host ""
        Write-Host "=== END DRY RUN ==="
        Write-Host ""
        Write-Host "To create the actual release, run this workflow again with 'Dry run' unchecked."
