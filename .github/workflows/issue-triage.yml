name: Issue Triage

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

jobs:
  triage:
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !github.event.issue.pull_request)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Triage issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          # Add ANTHROPIC_API_KEY to repo secrets: Settings → Secrets → Actions
          # Get a key at https://console.anthropic.com
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            You are a triage agent for the **Veeam Health Check (VHC)** repository — a .NET 8 Windows utility that generates configuration health-check reports for Veeam Backup & Replication (VBR) and Veeam Backup for Microsoft 365 (VB365). It collects data via PowerShell scripts, SQL, registry reads, and WMI, then compiles HTML/PDF/PPTX reports.

            Key components:
            - **Collection**: PowerShell scripts in `Tools/Scripts/HealthCheck/VBR/` and `VB365/`
            - **Reporting**: HTML compilers in `Functions/Reporting/Html/`
            - **Analysis**: `Functions/Analysis/`
            - **Export**: PDF (DinkToPdf), PowerPoint (HtmlToOpenXml), scrubbed mode
            - **UI**: WPF GUI in `Startup/VhcGui.xaml.cs`
            - **Entry**: `Startup/EntryPoint.cs` → `CArgsParser.cs`

            Do ALL of the following for issue #${{ github.event.issue.number }}:

            1. **Apply labels** via the GitHub REST API (gh CLI is not available in this environment — use curl):
               ```bash
               curl -s -X POST \
                 -H "Authorization: token $GITHUB_TOKEN" \
                 -H "Content-Type: application/json" \
                 "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" \
                 -d '{"labels": ["label1", "label2", "label3", "ai-classified"]}'
               ```
               Apply exactly: 1 type + 1 priority + 1 component + `ai-classified`

               **Type labels** (pick one): `bug`, `enhancement`, `question`, `documentation`, `wontfix`
               **Priority labels** (pick one):
               - `P0-critical` — data loss, crash on launch, security issue
               - `P1-high` — major feature broken, affects most users
               - `P2-medium` — feature partially broken, workaround exists
               - `P3-low` — cosmetic, minor inconvenience, nice-to-have
               **Component labels** (pick one): `vbr`, `vb365`, `collection`, `reporting`, `analysis`, `export`, `ui`, `performance`

            2. **Post a triage comment** in this exact format:

               ### Triage: [issue title]

               | Field | Value |
               |---|---|
               | **Type** | bug / enhancement / question / other |
               | **Priority** | P0–P3 — one-sentence justification |
               | **Component** | affected subsystem |
               | **Effort** | XS / S / M / L / XL |

               #### Root Cause Hypothesis
               Search the codebase. Name the specific file and line most likely responsible. Quote the relevant code if helpful.

               #### Suggested Fix
               Concrete next step — not vague advice. Name the function/method to change and what to change.

               ---
               *If the issue is vague or missing reproduction steps, ask for: VBR/VB365 version, OS version, and steps to reproduce.*
